# POPO algorithm-specific parameters
# This is the primary file to edit for POPO experiments.

# --- Generation ---
num_generations: 8
max_completion_length: 512
max_prompt_length: 512
temperature: 1.0
num_iterations: 1

# --- KL penalty (disabled for the actual POPO; similarity loss replaces KL) ---
beta: 0.0  

# --- POPO-specific hyperparameters ---
alpha: 0.1              # Similarity loss weight [0.05, 0.3]
beta_entropy: 0.01      # Entropy regularization coefficient [0.005, 0.05]
tau: 0.995              # EMA momentum [0.99, 0.999]
tau_r: 0.0              # Reward threshold (0 for binary RLVR)

# --- Predictor MLP ---
predictor_hidden_dim: 1024
predictor_layers: 2

# --- Target features ---
feature_noise_std: 0.02  # Gaussian noise on target features for robustness


# --- Weight mode ---
weight_mode: softmax # softmax or uniform
# length_normalize_weights: false # true or false, true will linearly normalize the weights by the response length