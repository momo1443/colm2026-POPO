# Base HuggingFace Trainer defaults
# These are shared across all algorithms (GRPO, POPO, etc.)
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-6
warmup_ratio: 0.1
lr_scheduler_type: cosine
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
seed: 42
optim: adamw_torch_fused
gradient_checkpointing: false

# Logging
logging_steps: 1
report_to: tensorboard

# Checkpointing
save_strategy: steps
save_steps: 1000
save_total_limit: 1

per_device_eval_batch_size: 4